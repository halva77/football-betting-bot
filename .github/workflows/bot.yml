name: betting-bot

on:
  schedule:
    - cron: "0 9 * * SAT"
    - cron: "0 9 * * SUN"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: python bot.py
